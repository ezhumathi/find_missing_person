<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Find People</title>
  </head>
  <body>
    <h1>Find People</h1>
    <form method="get" action="{% url 'search_people' %}">
      <input type="text" name="q" placeholder="Type a name or location" value="{{ query }}" />
      <button type="submit">Search</button>
    </form>
    <hr />
    {% if results %}
      <h2>Results</h2>
      <ul>
      {% for person in results %}
        <li>
          <strong>{{ person.name }}</strong> — Age: {{ person.age }} — Last seen: {{ person.last_seen_Location }}
          <div>{{ person.description }}</div>
        </li>
      {% endfor %}
      </ul>
    {% elif query %}
      <p>No results found for "{{ query }}".</p>
    {% endif %}
  </body>
</html>
